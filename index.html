<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BB Bucket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=mobilefix8" />
  </head>
  <body>
    <div class="app-shell">
      <div class="bg-orb orb-a"></div>
      <div class="bg-orb orb-b"></div>
      <div class="bg-grid"></div>

      <header class="hero-card">
        <div class="hero-copy">
          <h1>BB Bucket</h1>
          <p class="hero-text">今天不纠结，点一点就开饭。挑你想吃的，或者让系统帮你随机配一桌。</p>
        </div>
      </header>

      <main class="page-content">
        <section class="action-panel collapsible is-open" id="actionPanel">
          <button class="section-toggle" id="actionToggle" type="button" aria-expanded="true">
            <span>快速决定</span>
            <span class="toggle-arrow">⌃</span>
          </button>

          <div class="section-body action-row">
            <label class="select-card" for="dishCount">
              <span class="select-label">想来几道菜</span>
              <select id="dishCount" aria-label="选择生成菜品数量">
                <option value="1">1 道</option>
                <option value="2">2 道</option>
                <option value="3" selected>3 道</option>
                <option value="4">4 道</option>
                <option value="5">5 道</option>
                <option value="6">6 道</option>
              </select>
            </label>

            <div class="button-group">
              <button class="primary-btn" id="randomMenuBtn" type="button">一键生成今日菜单</button>
            </div>

            <div class="generated-block" id="generatedBlock" hidden>
              <div class="generated-list" id="generatedList"></div>
            </div>
          </div>
        </section>

        <section class="hot-section collapsible" id="hotSection">
          <button class="section-toggle" id="hotToggle" type="button" aria-expanded="false">
            <span>BB 精选</span>
            <span class="toggle-arrow">⌃</span>
          </button>
          <div class="section-body">
            <div class="hot-list" id="hotList"></div>
          </div>
        </section>

        <section class="browse-section">
          <div class="section-head">
            <div class="section-title">
            <span>挑菜区</span>
            </div>
            <div class="search-field">
              <input
                id="dishSearch"
                class="search-input"
                type="search"
                inputmode="search"
                placeholder="搜索菜品"
                autocomplete="off"
              />
              <button id="clearSearchBtn" class="clear-search-btn" type="button" hidden aria-label="清空搜索">×</button>
            </div>
          </div>
          <div class="browse-layout">
            <div class="category-sidebar" id="categoryTabs"></div>
            <div class="dish-scroll">
              <div class="dish-grid" id="dishGrid"></div>
            </div>
          </div>
        </section>
      </main>

      <div class="bottom-bar">
        <button class="bar-primary" id="menuFab" type="button">
          <span class="fab-badge" id="selectedCount">0</span>
          <span class="bar-copy">
            <strong>查看今日菜单</strong>
            <small id="barSummaryText">还没选菜</small>
          </span>
        </button>
      </div>

      <aside class="menu-drawer" id="menuDrawer" aria-hidden="true">
        <div class="drawer-backdrop" id="drawerBackdrop"></div>
        <div class="drawer-panel">
          <div class="drawer-handle"></div>
          <div class="drawer-header">
            <div>
              <p class="drawer-tag">Today's Picks</p>
              <h2>今日菜单</h2>
            </div>
            <button class="icon-btn" id="closeDrawerBtn" type="button" aria-label="关闭菜单">×</button>
          </div>

          <div class="drawer-summary">
            <span id="drawerCountText">还没选菜，先去逛逛吧</span>
          </div>

          <ul class="selected-list" id="selectedList"></ul>
        </div>
      </aside>
    </div>

    <div class="toast" id="toast" aria-live="polite"></div>

    <template id="dishCardTemplate">
      <article class="dish-card">
        <div class="dish-image-wrap">
          <div class="dish-image"></div>
        </div>
        <div class="dish-body">
          <h3></h3>
          <button class="add-btn" type="button" aria-label="加入今日菜单">+</button>
        </div>
      </article>
    </template>

    <template id="selectedItemTemplate">
      <li class="selected-item">
        <div>
          <strong></strong>
          <p class="selected-emoji"></p>
        </div>
        <button class="remove-btn" type="button">−</button>
      </li>
    </template>

    <template id="optionItemTemplate">
      <article class="option-item">
        <strong></strong>
        <button class="add-btn" type="button" aria-label="加入今日菜单">+</button>
      </article>
    </template>

    <script src="./script.js?v=mobilefix8"></script>
  </body>
</html>
