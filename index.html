<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>比奇堡唐食店</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="bg-orb orb-a"></div>
      <div class="bg-orb orb-b"></div>
      <div class="bg-grid"></div>

      <header class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Bikini Bottom Kitchen</p>
          <h1>比奇堡唐食店</h1>
          <p class="hero-text">今天不纠结，点一点就开饭。挑你想吃的，或者让系统帮你随机配一桌。</p>
        </div>
        <button class="menu-fab" id="menuFab" type="button">
          <span class="fab-badge" id="selectedCount">0</span>
          今日菜单
        </button>
      </header>

      <main class="page-content">
        <section class="action-panel">
          <div class="section-title">
            <span>快速决定</span>
            <p>选好菜数，剩下交给今天的手气。</p>
          </div>

          <div class="action-row">
            <label class="select-card" for="dishCount">
              <span class="select-label">想来几道菜</span>
              <select id="dishCount" aria-label="选择生成菜品数量">
                <option value="2">2 道</option>
                <option value="3" selected>3 道</option>
                <option value="4">4 道</option>
                <option value="5">5 道</option>
                <option value="6">6 道</option>
              </select>
            </label>

            <div class="button-group">
              <button class="primary-btn" id="randomMenuBtn" type="button">一键生成今日菜单</button>
              <button class="ghost-btn" id="surpriseBtn" type="button">帮我配一顿</button>
            </div>
          </div>
        </section>

        <section class="hot-section">
          <div class="section-title">
            <span>今日热门</span>
            <p>犹豫的时候，先看大家都爱点什么。</p>
          </div>
          <div class="hot-list" id="hotList"></div>
        </section>

        <section class="browse-section">
          <div class="section-title">
            <span>挑菜区</span>
            <p>按分类切换，想吃什么一眼锁定。</p>
          </div>
          <div class="category-tabs" id="categoryTabs"></div>
          <div class="dish-grid" id="dishGrid"></div>
        </section>
      </main>

      <aside class="menu-drawer" id="menuDrawer" aria-hidden="true">
        <div class="drawer-backdrop" id="drawerBackdrop"></div>
        <div class="drawer-panel">
          <div class="drawer-header">
            <div>
              <p class="drawer-tag">Today's Picks</p>
              <h2>今日菜单</h2>
            </div>
            <button class="icon-btn" id="closeDrawerBtn" type="button" aria-label="关闭菜单">×</button>
          </div>

          <div class="drawer-summary">
            <span id="drawerCountText">还没选菜，先去逛逛吧</span>
            <button class="text-btn" id="clearMenuBtn" type="button">清空重选</button>
          </div>

          <ul class="selected-list" id="selectedList"></ul>
        </div>
      </aside>
    </div>

    <template id="dishCardTemplate">
      <article class="dish-card">
        <div class="dish-image-wrap">
          <div class="dish-image"></div>
          <span class="dish-badge"></span>
        </div>
        <div class="dish-body">
          <div class="dish-head">
            <h3></h3>
            <span class="dish-category"></span>
          </div>
          <p class="dish-desc"></p>
          <button class="add-btn" type="button">加入今日菜单</button>
        </div>
      </article>
    </template>

    <template id="selectedItemTemplate">
      <li class="selected-item">
        <div>
          <strong></strong>
          <p></p>
        </div>
        <button class="remove-btn" type="button">删除</button>
      </li>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
