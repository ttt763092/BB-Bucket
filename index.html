<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BB Bucket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=cachefix1" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-card">
        <p class="eyebrow">Bikini Bottom Kitchen</p>
        <div class="hero-top">
          <div>
            <h1>BB Bucket</h1>
            <p class="hero-text">今天吃什么，3 秒决定。先选几道，再从列表里快速点菜。</p>
          </div>
          <button class="menu-pill" id="menuFab" type="button">
            <span id="selectedCount">0</span>
            菜单
          </button>
        </div>

        <section class="quick-bar">
          <label class="count-picker" for="dishCount">
            <span>菜品数</span>
            <select id="dishCount" aria-label="选择生成菜品数量">
              <option value="2">2 道</option>
              <option value="3" selected>3 道</option>
              <option value="4">4 道</option>
              <option value="5">5 道</option>
              <option value="6">6 道</option>
            </select>
          </label>
          <button class="primary-btn" id="randomMenuBtn" type="button">随机补齐</button>
        </section>
      </header>

      <main class="page-content">
        <section class="feature-strip">
          <div class="feature-chip">16 道示例菜</div>
          <div class="feature-chip">后续可扩到 100+</div>
          <div class="feature-chip">点击整行即可选菜</div>
        </section>

        <section class="hot-section">
          <div class="section-head">
            <h2>BB 精选</h2>
            <span>犹豫时先看这里</span>
          </div>
          <div class="hot-list" id="hotList"></div>
        </section>

        <section class="browse-section">
          <div class="section-head">
            <h2>挑菜区</h2>
            <span id="dishCountLabel">共 16 道菜</span>
          </div>
          <div class="category-tabs" id="categoryTabs"></div>
          <div class="dish-list" id="dishGrid"></div>
        </section>
      </main>

      <div class="bottom-bar">
        <button class="bar-secondary" id="randomBarBtn" type="button">随机补齐</button>
        <button class="bar-primary" id="openMenuBtn" type="button">
          <strong>今日菜单</strong>
          <small id="barSummaryText">还没选菜</small>
        </button>
      </div>

      <aside class="menu-sheet" id="menuDrawer" aria-hidden="true">
        <div class="sheet-backdrop" id="drawerBackdrop"></div>
        <div class="sheet-panel">
          <div class="sheet-handle"></div>
          <div class="sheet-header">
            <div>
              <p class="drawer-tag">Today's Picks</p>
              <h2>今日菜单</h2>
            </div>
            <button class="icon-btn" id="closeDrawerBtn" type="button" aria-label="关闭菜单">×</button>
          </div>

          <div class="sheet-summary">
            <span id="drawerCountText">还没选菜，先去逛逛吧</span>
            <button class="text-btn" id="rerollMenuBtn" type="button">再次随机</button>
          </div>

          <ul class="selected-list" id="selectedList"></ul>
        </div>
      </aside>
    </div>

    <div class="toast" id="toast" aria-live="polite"></div>

    <template id="dishCardTemplate">
      <button class="dish-row" type="button">
        <span class="dish-emoji"></span>
        <span class="dish-main">
          <span class="dish-line">
            <strong class="dish-name"></strong>
            <span class="dish-meta"></span>
          </span>
          <span class="dish-desc"></span>
        </span>
        <span class="dish-state"></span>
      </button>
    </template>

    <template id="selectedItemTemplate">
      <li class="selected-item">
        <div>
          <strong></strong>
          <p></p>
        </div>
        <button class="remove-btn" type="button">删除</button>
      </li>
    </template>

    <script src="./script.js?v=cachefix1"></script>
  </body>
</html>
